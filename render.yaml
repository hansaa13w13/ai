services:
  - type: web
    name: bist-predator
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 5000
      - key: DATA_DIR
        value: /data/cache
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
    disk:
      name: predator-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /?action=daemon_status
